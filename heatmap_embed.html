<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gu-navy: #002868; --muted: #666; --bg: #f5f5f0; }
    body { background: white; font-family: 'Georgia', serif; }

    .controls {
      display: flex; justify-content: center; align-items: center;
      gap: .75rem; padding: .75rem 1rem .5rem; flex-wrap: wrap;
    }
    .toggle-group {
      display: flex; border: 2px solid var(--gu-navy); border-radius: 6px; overflow: hidden;
    }
    .toggle-btn {
      padding: .35rem 1rem; border: none; cursor: pointer;
      font-family: 'Georgia', serif; font-size: .82rem;
      background: white; color: var(--gu-navy); transition: all .2s;
    }
    .toggle-btn.active { background: var(--gu-navy); color: white; font-weight: 700; }
    .ctrl-label { font-size: .82rem; color: var(--muted); }

    .map-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: .75rem;
      padding: 0 .75rem .75rem;
    }
    @media (max-width: 680px) { .map-grid { grid-template-columns: 1fr; } }

    .map-panel { background: var(--bg); border-radius: 8px; padding: .6rem; }
    .map-title { text-align: center; font-size: .95rem; font-weight: 700; color: var(--gu-navy); }
    .map-subtitle { text-align: center; font-size: .73rem; color: var(--muted); margin-bottom: .3rem; }
    .map-plot { height: 340px; }
  </style>
</head>
<body>

<div class="controls">
  <span class="ctrl-label">Show:</span>
  <div class="toggle-group">
    <button class="toggle-btn active" onclick="setMetric('enrolled')">Confirmed / Enrolled</button>
    <button class="toggle-btn"        onclick="setMetric('admitted')">Admitted</button>
  </div>
</div>

<div class="map-grid">
  <div class="map-panel">
    <div class="map-title">Fall 1997</div>
    <div class="map-subtitle" id="sub97"></div>
    <div class="map-plot" id="map97"></div>
  </div>
  <div class="map-panel">
    <div class="map-title">Fall 2025</div>
    <div class="map-subtitle" id="sub25"></div>
    <div class="map-plot" id="map25"></div>
  </div>
</div>

<script>
const DATA = {
  s97: ["AK","AZ","CA","CO","CT","DC","FL","GA","GU","HI","IA","ID","IL","IN","KS","LA","MA","MD","ME","MI","MN","MO","MP","MT","NC","NE","NJ","NM","NV","NY","OH","OK","OR","RI","SC","SD","TX","UT","VA","VT","WA","WI","WY"],
  e97: [11,9,46,17,2,0,4,1,0,6,0,32,4,0,1,1,3,2,0,1,14,2,0,27,6,2,0,1,11,2,1,1,54,0,2,0,10,3,4,0,213,1,0],
  a97: [35,21,161,56,2,1,4,1,4,39,1,111,6,3,2,1,3,2,0,2,24,5,0,98,7,9,1,10,27,4,5,1,153,0,2,3,15,24,9,1,611,5,5],
  s25: ["AK","AL","AR","AZ","CA","CO","CT","DC","FL","GA","GU","HI","IA","ID","IL","IN","KS","KY","LA","MA","MD","ME","MI","MN","MO","MP","MT","NC","ND","NE","NH","NJ","NM","NV","NY","OH","OK","OR","PA","PR","RI","SC","SD","TN","TX","UT","VA","VT","WA","WI","WY"],
  e25: [15,1,0,15,159,32,2,0,4,3,0,22,0,30,11,0,0,0,0,2,0,0,0,8,1,0,16,0,1,2,0,1,2,9,0,0,4,121,1,0,0,3,0,0,17,12,3,1,611,7,2],
  a25: [70,2,2,117,1812,349,17,2,23,15,8,121,8,117,82,14,6,5,6,24,16,5,15,122,14,1,96,15,1,26,4,15,23,91,33,12,10,679,13,1,5,7,4,10,148,58,15,7,2632,38,12],
};

const COLORSCALE = [
  [0,'#e8ecf5'],[0.05,'#b8c8e8'],[0.2,'#6a93d4'],
  [0.45,'#2d5ea8'],[0.7,'#002868'],[1,'#001040'],
];

const LAYOUT = {
  geo: { scope:'usa', showlakes:false, showland:true, landcolor:'#f0f0ec',
         bgcolor:'transparent', projection:{type:'albers usa'} },
  margin:{t:0,b:0,l:0,r:0},
  paper_bgcolor:'transparent', plot_bgcolor:'transparent',
};
const CFG = { responsive:true, displayModeBar:false };

function draw(metric) {
  const [v97, v25] = metric === 'enrolled'
    ? [DATA.e97, DATA.e25] : [DATA.a97, DATA.a25];
  const zmax = metric === 'enrolled' ? 620 : 2700;
  const lbl  = metric === 'enrolled' ? 'Enrolled' : 'Admitted';

  const trace = (states, vals, showbar) => ({
    type:'choropleth', locationmode:'USA-states',
    locations:states, z:vals,
    hovertemplate:'<b>%{location}</b><br>'+lbl+': %{z}<extra></extra>',
    colorscale:COLORSCALE, zmin:0, zmax,
    showscale: showbar,
    colorbar:{ title:{text:lbl,font:{size:10}}, thickness:10, len:.65, x:1.01 },
    marker:{ line:{ color:'white', width:.8 } },
  });

  Plotly.newPlot('map97', [trace(DATA.s97, v97, false)], LAYOUT, CFG);
  Plotly.newPlot('map25', [trace(DATA.s25, v25, true)],  LAYOUT, CFG);

  const t97 = v97.reduce((a,b)=>a+b,0);
  const t25 = v25.reduce((a,b)=>a+b,0);
  const n97 = v97.filter(v=>v>0).length;
  const n25 = v25.filter(v=>v>0).length;
  document.getElementById('sub97').textContent = `${t97.toLocaleString()} ${lbl.toLowerCase()} · ${n97} states`;
  document.getElementById('sub25').textContent = `${t25.toLocaleString()} ${lbl.toLowerCase()} · ${n25} states`;
}

function setMetric(m) {
  document.querySelectorAll('.toggle-btn').forEach((b,i) =>
    b.classList.toggle('active', (m==='enrolled') === (i===0)));
  draw(m);
}

draw('enrolled');
</script>
</body>
</html>
